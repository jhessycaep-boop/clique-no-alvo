<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clique no Alvo</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <link rel="apple-touch-icon" href="icon-192.png">

  <link rel="stylesheet" href="style.css">

  <style>
    html, body { overscroll-behavior: none; }
  </style>
</head>

<body>

<div id="menu">
  <h1>🎯 Clique no Alvo</h1>
  <button id="playBtn">Jogar</button>
  <button id="shopBtn">Loja</button>
  <button id="rankBtn">Ranking</button>
  <button onclick="showTargets()">📖 Alvos</button>
  <button onclick="resetProgress()">🗑️ Resetar Progresso</button>
  <p>💰 Moedas: <span id="coins">0</span></p>
</div>

<div id="shop" class="hidden">
  <h2>🛒 Loja</h2>
  <button onclick="buy('life')">❤️ Vida (50)</button>
  <button onclick="buy('time')">⏱️ Tempo (50)</button>
  <button onclick="buy('ice')">❄️ Gelo (30)</button>
  <button onclick="buy('electric')">⚡ Elétrico (40)</button>
  <button onclick="backMenu()">⬅️ Voltar</button>
  <div id="recoverArea"></div>
</div>

<div id="ranking" class="hidden">
  <h2>🏆 Ranking</h2>
  <ul id="rankList"></ul>
  <button onclick="backMenu()">⬅️ Voltar</button>
</div>

<div id="game" class="hidden"></div>

<script src="game.js"></script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").then(reg => {

    reg.onupdatefound = () => {
      const newWorker = reg.installing;

      newWorker.onstatechange = () => {
        if (newWorker.state === "installed") {
          if (navigator.serviceWorker.controller) {
            // nova versão disponível
            location.reload();
          }
        }
      };
    };

  });
}
</script>

<script>
let startY = 0;
document.addEventListener("touchstart", e => startY = e.touches[0].clientY);
document.addEventListener("touchmove", e => {
  if(e.touches[0].clientY > startY) e.preventDefault();
},{passive:false});
</script>

</body>
</html>
